<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings | Astronomy Academy</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="icon" type="image/png" href="../img/favicon.png">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .settings-form {
            max-width: 600px;
            margin: 0 auto;
            text-align: left;
        }
        
        .settings-section {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 30px;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 15px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-primary);
        }
    </style>
</head>
<body class="dashboard-body">

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="../index.html" class="logo">
                <i data-lucide="orbit"></i>
                ASCLOGY
            </a>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item"><i data-lucide="layout-dashboard"></i> Overview</a>
            <a href="sessions.html" class="nav-item"><i data-lucide="video"></i> Sessions</a>
            <a href="materials.html" class="nav-item"><i data-lucide="book-open"></i> Materials</a>
            <a href="logs.html" class="nav-item"><i data-lucide="activity"></i> Observing Logs</a>
            <a href="settings.html" class="nav-item active"><i data-lucide="settings"></i> Settings</a>
        </nav>
        <div class="sidebar-footer">
            <a href="../login.html" class="nav-item" style="color: #ef4444;"><i data-lucide="log-out"></i> Logout</a>
        </div>
    </aside>
    
    <!-- Sidebar Backdrop Overlay -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <main class="dashboard-main">
        <header class="dashboard-header">
            <button id="dash-hamburger" class="hamburger" aria-label="Toggle Sidebar" title="Toggle Sidebar">
                <i data-lucide="menu"></i>
            </button>
            <div class="header-search">
                <input type="text" placeholder="Search settings...">
            </div>
            <div class="header-actions">
                <button class="icon-btn" aria-label="Notifications" title="Notifications"><i data-lucide="bell"></i><span class="notification-badge"></span></button>
                <div class="rtl-toggle" aria-label="Toggle RTL" title="Toggle RTL Layout">
                    <i data-lucide="arrow-right-left"></i>
                </div>
                <button id="dash-theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode" title="Toggle Dark Mode"><i data-lucide="moon"></i></button>
                <div class="profile-trigger"><div class="profile-img">JD</div><span style="font-weight: 600;">John Doe</span></div>
            </div>
        </header>

        <section class="dashboard-content">
            <h1 class="text-center">Account <span style="color: var(--accent-primary);">Settings</span></h1>
            
            <div class="settings-form">
                
                <!-- Profile Section -->
                <div class="settings-section">
                    <h3>Profile Information</h3>
                    <div style="display: flex; align-items: center; gap: 20px; margin: 25px 0;">
                        <div class="profile-img" style="width: 80px; height: 80px; font-size: 2rem;">JD</div>
                        <button class="btn btn-secondary" style="height: 40px;">Change Photo</button>
                    </div>

                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" value="John Doe">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" value="john@example.com">
                    </div>
                    <div class="form-group">
                        <label>Observatory Location</label>
                        <input type="text" placeholder="Where is your scope located?">
                    </div>
                </div>

                <!-- Preferences Section -->
                <div class="settings-section">
                    <h3>App Preferences</h3>
                    <div class="form-group">
                        <label>Default Units</label>
                        <select>
                            <option>Metric (Celsius, Meters)</option>
                            <option>Imperial (Fahrenheit, Feet)</option>
                        </select>
                    </div>
                    <div class="form-group" style="display: flex; justify-content: space-between; align-items: center;">
                        <label style="margin: 0;">Email Notifications</label>
                        <input type="checkbox" checked style="width: auto;">
                    </div>
                    <div class="form-group" style="display: flex; justify-content: space-between; align-items: center;">
                        <label style="margin: 0;">New Materials Alert</label>
                        <input type="checkbox" checked style="width: auto;">
                    </div>
                </div>

                <div class="btn-center">
                    <button class="btn btn-primary" style="padding: 12px 60px;">Save Changes</button>
                </div>

            </div>
        </section>
    </main>

    <script src="../js/main.js"></script>
</body>
</html>

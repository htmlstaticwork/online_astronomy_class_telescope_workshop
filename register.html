<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Astronomy Academy</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="icon" type="image/png" href="img/favicon.png">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <div class="auth-card" style="max-width: 500px;">

        <div class="auth-icons">
            <button id="theme-toggle" class="theme-toggle" style="width: 30px; height: 30px;"><i
                    data-lucide="moon"></i></button>
            <div class="rtl-toggle" style="width: 30px; height: 30px;"><i data-lucide="languages"></i></div>
        </div>

        <div class="auth-header">
            <a href="index.html" class="logo">
                <i data-lucide="orbit"></i>
                ASCLOGY
            </a>
            <h2>Join</h2>

        </div>

        <form>
            <div class="form-group">
                <label for="name">Full Name</label>
                <div class="input-wrapper">
                    <input type="text" id="name" name="name" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <input type="email" id="email" name="email" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password" required>
                    <div class="password-toggle" id="togglePassword">
                        <i data-lucide="eye"></i>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <div class="input-wrapper">
                    <input type="password" id="confirm-password" name="confirm-password" required>
                    <div class="password-toggle" id="toggleConfirmPassword">
                        <i data-lucide="eye"></i>
                    </div>
                </div>
            </div>

            <div class="form-footer">
                <label style="display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" name="terms" required> I agree to the <a href="#"
                        style="color: var(--accent-primary); text-decoration: none;">Terms of Service</a>
                </label>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; border-radius: var(--radius-md);">Create
                Account</button>
        </form>

        <div class="social-auth">
            <p style="font-size: 0.85rem; color: var(--text-secondary);">OR SIGN UP WITH</p>
            <div class="social-buttons">
                <button class="social-btn">
                    <svg width="20" height="20" viewBox="0 0 48 48">
                        <path fill="#FFC107"
                            d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4C12.955 4 4 12.955 4 24s8.955 20 20 20s20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z" />
                        <path fill="#FF3D00"
                            d="m6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4C16.318 4 9.656 8.337 6.306 14.691z" />
                        <path fill="#4CAF50"
                            d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z" />
                        <path fill="#1976D2"
                            d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z" />
                    </svg>
                    Google
                </button>
                <button class="social-btn">
                    <i data-lucide="apple" style="width: 20px;"></i>
                    Apple
                </button>
            </div>
        </div>

        <div class="auth-switch">
            <p>Already have an account? <a href="login.html">Sign In</a></p>
        </div>

    </div>

    <script src="js/main.js"></script>
    <script>
        const setupToggle = (toggleId, inputId) => {
            document.getElementById(toggleId).addEventListener('click', function () {
                const passwordInput = document.getElementById(inputId);
                const eyeIcon = this.querySelector('i');
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    eyeIcon.setAttribute('data-lucide', 'eye-off');
                } else {
                    passwordInput.type = 'password';
                    eyeIcon.setAttribute('data-lucide', 'eye');
                }
                lucide.createIcons();
            });
        };

        setupToggle('togglePassword', 'password');
        setupToggle('toggleConfirmPassword', 'confirm-password');
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centering Mastery | ASCLOGY</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    
    <!-- Google Fonts: Inter & Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --shadow-premium: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        [data-theme="dark"] {
            --glass-bg: rgba(15, 23, 42, 0.9);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a; /* Deep space background */
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            margin: 0;
            padding: 0;
            /* Requirement 1: Flexbox centering on body */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Requirement 1: Wrapper to prevent edge sticking */
        .page-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
            perspective: 1000px;
        }

        /* Requirement 2 & 4: Card Layout & Design */
        .premium-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; /* Requirement: ~15px */
            box-shadow: var(--shadow-premium);
            padding: 40px;
            text-align: center; /* Requirement 2: Center-aligned content */
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeIn 0.8s ease-out;
        }

        .premium-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-box {
            width: 70px;
            height: 70px;
            background: var(--primary-gradient);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            color: white;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        .sub-heading {
            font-size: 1.05rem;
            color: var(--text-muted);
            margin-bottom: 35px;
            line-height: 1.6;
        }

        /* Requirement 2 & 4: Centered full-width button */
        .btn-modern {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn-modern:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(168, 85, 247, 0.5);
            color: white;
        }

        /* Requirement 3: Media Queries */
        
        /* Mobile (default) */
        .premium-card {
            width: 95%; /* Requirement 3: 90-95% */
            max-width: 100%;
        }

        /* Tablet (min-width: 768px) */
        @media (min-width: 768px) {
            .premium-card {
                max-width: 500px; /* Requirement 3: ~500px */
            }
        }

        /* Desktop (min-width: 1024px) */
        @media (min-width: 1024px) {
            .premium-card {
                max-width: 400px; /* Requirement 3: ~400px */
            }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <div class="premium-card">
            <div class="icon-box">
                <i data-lucide="sparkles" size="32"></i>
            </div>
            
            <h1>Elevate Your UI</h1>
            <p class="sub-heading">
                Experience the perfect blend of precision alignment and modern aesthetics. Designed to scale seamlessly across every device.
            </p>

            <button class="btn btn-modern">
                Get Started Now
            </button>
        </div>
    </div>

    <!-- Lucide Icon Initialization -->
    <script>
        lucide.createIcons();
    </script>
    
    <!-- Bootstrap JS (Optional for simple card but required for project standards) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
